[colors]
; Palet Tokyo Night
; Menambahkan transparansi (DD) pada background
background = #DD1a1b26  
background-alt = #24283b
foreground = #c0caf5

; Warna Warni Modul
blue = #7aa2f7
cyan = #7dcfff
green = #9ece6a
yellow = #e0af68
red = #f7768e
magenta = #bb9af7
orange = #ff9e64
disabled = #565f89

[bar/example]
; Pengaturan Floating Bar
width = 98%
offset-x = 1%
offset-y = 1%
height = 24pt
radius = 12

tray-padding = 2
tray-maxsize = 16

background = ${colors.background}
foreground = ${colors.foreground}

line-size = 3pt
border-size = 4pt
border-color = #00000000

padding-left = 0
padding-right = 1

module-margin = 2

separator = |
separator-foreground = ${colors.disabled}

; Pastikan font ini terinstal agar ikon tidak kotak-kotak
font-0 = "FiraCode Nerd Font:size=10;2"
font-1 = "Symbols Nerd Font:size=12;2"
font-2 = "Font Awesome 6 Free:style=Solid:size=12;2"

modules-left = xworkspaces xwindow
modules-right = filesystem pulseaudio xkeyboard memory cpu eth wlan battery date systray powermenu

cursor-click = pointer
cursor-scroll = ns-resize
enable-ipc = true

[module/systray]
type = internal/tray
format-margin = 8pt
tray-spacing = 16pt

[module/xworkspaces]
type = internal/xworkspaces

label-active = %name%
label-active-background = ${colors.background-alt}
label-active-underline = ${colors.blue}
label-active-padding = 1

label-occupied = %name%
label-occupied-padding = 1

label-urgent = %name%
label-urgent-background = ${colors.red}
label-urgent-padding = 1

label-empty = %name%
label-empty-foreground = ${colors.disabled}
label-empty-padding = 1

[module/xwindow]
type = internal/xwindow
label = %title:0:60:...%

[module/filesystem]
type = internal/fs
interval = 25
mount-0 = /

format-mounted-prefix = "ůįčä "
format-mounted-prefix-foreground = ${colors.cyan}
label-mounted = %free%

label-unmounted = %mountpoint% not mounted
label-unmounted-foreground = ${colors.disabled}

[module/pulseaudio]
type = internal/pulseaudio

format-volume-prefix = "VOL "
format-volume-prefix-foreground = ${colors.blue}
format-volume = <label-volume>

label-volume = %percentage%%

label-muted = muted
label-muted-foreground = ${colors.disabled}

[module/xkeyboard]
type = internal/xkeyboard
blacklist-0 = num lock

label-layout = %layout%
label-layout-foreground = ${colors.magenta}

label-indicator-padding = 2
label-indicator-margin = 1
label-indicator-foreground = ${colors.background}
label-indicator-background = ${colors.blue}

[module/memory]
type = internal/memory
interval = 3
format-prefix = "ÓČ¶ "
format-prefix-foreground = ${colors.green}
label = %mb_used%

[module/cpu]
type = internal/cpu
interval = 2
format-prefix = "Ôčõ "
format-prefix-foreground = ${colors.red}
label = %percentage%%

[network-base]
type = internal/network
interval = 1.0
format-connected = <label-connected>
; Panah Download (Hijau) & Panah Upload (Oranye)
label-connected = "%{F#9ece6a}ůįáö%{F-} %downspeed%  %{F#ff9e64}ůįēí%{F-} %upspeed%"
format-disconnected = 

[module/wlan]
inherit = network-base
interface = wlp3s0
format-connected-prefix = "Ôáę  "
format-connected-prefix-foreground = ${colors.blue}

[module/eth]
inherit = network-base
interface = enp0s31f6
format-connected-prefix = "ůįąÄ  "
format-connected-prefix-foreground = ${colors.magenta}

[module/battery]
type = internal/battery
full-at = 99
low-at = 15
battery = BAT0
adapter = ADP1

format-charging = <animation-charging> <label-charging>
label-charging = %percentage%%

format-discharging = <ramp-capacity> <label-discharging>
label-discharging = %percentage%%

animation-charging-0 = ÔČĄ ůĪźč
animation-charging-1 = ÔČÉ ůĪźč
animation-charging-2 = ÔČā ůĪźč
animation-charging-3 = ÔČĀ ůĪźč
animation-charging-4 = ÔČÄ ůĪźč
animation-charging-framerate = 750
format-charging-foreground = ${colors.green}
format-discharging-foreground = ${colors.foreground}

ramp-capacity-0 = ÔČĄ
ramp-capacity-1 = ÔČÉ
ramp-capacity-2 = ÔČā
ramp-capacity-3 = ÔČĀ
ramp-capacity-4 = ÔČÄ
ramp-capacity-0-foreground = ${colors.red}
ramp-capacity-1-foreground = ${colors.orange}
ramp-capacity-2-foreground = ${colors.yellow}

[module/powermenu]
type = custom/text
format = <label>
label = "ÔÄĎ"
label-foreground = ${colors.red}
label-padding = 1

click-left = /home/wrjunior/.config/rofi/powermenu/type-5/powermenu.sh

[module/date]
type = internal/date
interval = 1

date = %H:%M
date-alt = %Y-%m-%d %H:%M:%S

label = %date%
label-foreground = ${colors.yellow}

[settings]
screenchange-reload = true
pseudo-transparency = true

; vim:ft=dosini
