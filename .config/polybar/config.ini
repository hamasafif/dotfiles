;==========================================================
; POLYBAR CONFIGURATION - wrjunior (L460 Edition)
;==========================================================

[colors]
background = #282A2E
background-alt = #373B41
foreground = #C5C8C6
primary = #F0C674
secondary = #8ABEB7
alert = #A54242
disabled = #707880

[bar/example]
width = 100%
height = 24pt
radius = 6
tray-padding = 2
tray-maxsize = 16

background = ${colors.background}
foreground = ${colors.foreground}

line-size = 3pt
border-size = 4pt
border-color = #00000000

padding-left = 0
padding-right = 1
module-margin = 2

separator = |
separator-foreground = ${colors.disabled}

# Memastikan font mendukung ikon Nerd Font dan Font Awesome
font-0 = "FiraCode Nerd Font:size=10;2"
font-1 = "Symbols Nerd Font:size=12;2"
font-2 = "Font Awesome 6 Free:style=Solid:size=12;2"

# Susunan Modul
modules-left = xworkspaces xwindow
modules-right = filesystem pulseaudio xkeyboard memory cpu eth wlan battery date systray powermenu

cursor-click = pointer
cursor-scroll = ns-resize
enable-ipc = true

# ==========================================
# MODULES - LEFT
# ==========================================

[module/xworkspaces]
type = internal/xworkspaces
label-active = %name%
label-active-background = ${colors.background-alt}
label-active-underline= ${colors.primary}
label-active-padding = 1
label-occupied = %name%
label-occupied-padding = 1
label-urgent = %name%
label-urgent-background = ${colors.alert}
label-urgent-padding = 1
label-empty = %name%
label-empty-foreground = ${colors.disabled}
label-empty-padding = 1

[module/xwindow]
type = internal/xwindow
label = %title:0:60:...%

# ==========================================
# MODULES - RIGHT (SYSTEM & NETWORK)
# ==========================================

[module/filesystem]
type = internal/fs
interval = 25
mount-0 = /
format-mounted-prefix = "󰋊 "
format-mounted-prefix-foreground = ${colors.primary}
label-mounted = %percentage_used%%
label-unmounted = %mountpoint% not mounted
label-unmounted-foreground = ${colors.disabled}

[module/pulseaudio]
type = internal/pulseaudio
format-volume-prefix = "VOL "
format-volume-prefix-foreground = ${colors.primary}
format-volume = <label-volume>
label-volume = %percentage%%
label-muted = muted
label-muted-foreground = ${colors.disabled}

[module/memory]
type = internal/memory
interval = 3
format-prefix = " "
format-prefix-foreground = ${colors.primary}
label = %percentage_used%%

[module/cpu]
type = internal/cpu
interval = 2
format-prefix = " "
format-prefix-foreground = ${colors.primary}
label = %percentage%%

# --- NETWORK MONITOR (SPEED TEST) ---
[network-base]
type = internal/network
interval = 1.0
format-connected = <label-connected>
# Menyembunyikan modul jika interface tidak aktif (Otomatis Prioritas)
format-disconnected = 
label-connected = "%{F#F0C674}󰇚%{F-} %downspeed% %{F#F0C674}󰕒%{F-} %upspeed%"

[module/wlan]
inherit = network-base
# Silakan ganti wlan0 jika interface wifi kamu berbeda
interface = wlan0
format-connected-prefix = " "
format-connected-prefix-foreground = ${colors.primary}

[module/eth]
inherit = network-base
# Menggunakan interface ethernet L460 kamu
interface = enp0s31f6
format-connected-prefix = "󰈀 "
format-connected-prefix-foreground = ${colors.primary}

[module/battery]
type = internal/battery
full-at = 99
low-at = 15
battery = BAT0
adapter = ADP1
format-charging = <animation-charging> <label-charging>
label-charging = %percentage%%
format-discharging = <ramp-capacity> <label-discharging>
label-discharging = %percentage%%
animation-charging-0 =  󱐋
animation-charging-1 =  󱐋
animation-charging-2 =  󱐋
animation-charging-3 =  󱐋
animation-charging-4 =  󱐋
animation-charging-framerate = 750
format-charging-foreground = #a3be8c
ramp-capacity-0 = 
ramp-capacity-1 = 
ramp-capacity-2 = 
ramp-capacity-3 = 
ramp-capacity-4 = 

[module/date]
type = internal/date
interval = 1
date = %H:%M
date-alt = %Y-%m-%d %H:%M:%S
label = %date%
label-foreground = ${colors.primary}

[module/systray]
type = internal/tray
format-margin = 8pt
tray-spacing = 16pt

[module/powermenu]
type = custom/text
format = <label>
label = ""
label-foreground = #ff5555
label-padding = 1
click-left = ~/.config/rofi/powermenu.sh

[settings]
screenchange-reload = true
pseudo-transparency = true
