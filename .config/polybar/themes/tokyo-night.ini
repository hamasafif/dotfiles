[colors]
background = #DD1a1b26
background-alt = #24283b
foreground = #c0caf5
blue = #7aa2f7
cyan = #7dcfff
green = #9ece6a
yellow = #e0af68
red = #f7768e
magenta = #bb9af7
orange = #ff9e64
disabled = #565f89

[bar/example]
width = 98%
offset-x = 1%
offset-y = 1%
height = 24pt
radius = 12
border-size = 4pt
border-color = #00000000
background = ${colors.background}
foreground = ${colors.foreground}
line-size = 3pt
padding-left = 1
padding-right = 1
module-margin = 2
separator = |
separator-foreground = ${colors.disabled}

font-0 = "FiraCode Nerd Font:size=10;2"
font-1 = "Symbols Nerd Font:size=12;2"
font-2 = "Font Awesome 6 Free:style=Solid:size=12;2"

modules-left = xworkspaces xwindow
modules-right = filesystem pulseaudio memory cpu eth wlan battery date systray powermenu
cursor-click = pointer
enable-ipc = true

[module/systray]
type = internal/tray
tray-spacing = 8pt

[module/xworkspaces]
type = internal/xworkspaces
label-active = %name%
label-active-background = ${colors.background-alt}
label-active-underline = ${colors.blue}
label-active-padding = 1
label-occupied = %name%
label-occupied-padding = 1
label-urgent = %name%
label-urgent-background = ${colors.red}
label-urgent-padding = 1
label-empty = %name%
label-empty-foreground = ${colors.disabled}
label-empty-padding = 1

[module/xwindow]
type = internal/xwindow
label = %title:0:40:...%

[module/filesystem]
type = internal/fs
interval = 25
mount-0 = /
format-mounted-prefix = "󰋊 "
format-mounted-prefix-foreground = ${colors.cyan}
label-mounted = %free%

[module/pulseaudio]
type = internal/pulseaudio
format-volume-prefix = "VOL "
format-volume-prefix-foreground = ${colors.blue}
label-volume = %percentage%%
label-muted = "muted"
label-muted-foreground = ${colors.disabled}

[module/memory]
type = internal/memory
interval = 3
format-prefix = " "
format-prefix-foreground = ${colors.green}
label = %mb_used%

[module/cpu]
type = internal/cpu
interval = 2
format-prefix = " "
format-prefix-foreground = ${colors.red}
label = %percentage%%

[network-base]
type = internal/network
interval = 1.0
format-connected = <label-connected>
label-connected = "%{F#9ece6a}󰇚%{F-} %downspeed%  %{F#ff9e64}󰕒%{F-} %upspeed%"

[module/wlan]
inherit = network-base
interface = wlp3s0
format-connected-prefix = "  "
format-connected-prefix-foreground = ${colors.blue}

[module/eth]
inherit = network-base
interface = enp0s31f6
format-connected-prefix = "󰈀  "
format-connected-prefix-foreground = ${colors.magenta}

[module/battery]
type = internal/battery
full-at = 99
low-at = 15
battery = BAT0
adapter = ADP1
format-charging = <animation-charging> <label-charging>
format-charging-foreground = ${colors.green}
format-discharging = <ramp-capacity> <label-discharging>
label-charging = %percentage%%
label-discharging = %percentage%%
ramp-capacity-0 = 
ramp-capacity-1 = 
ramp-capacity-2 = 
ramp-capacity-0-foreground = ${colors.red}
animation-charging-0 = 
animation-charging-1 = 
animation-charging-2 = 
animation-charging-framerate = 750

[module/powermenu]
type = custom/text
format = <label>
label = ""
label-foreground = ${colors.red}
click-left = ~/.config/rofi/powermenu.sh

[module/date]
type = internal/date
interval = 1
date = %H:%M
label = %date%
label-foreground = ${colors.yellow}
