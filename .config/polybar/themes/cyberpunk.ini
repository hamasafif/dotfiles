[colors]
background = #660f0f1b
background-alt = #881a1b26
foreground = #00fff2
neon-pink = #ff00ff
neon-blue = #00fff2
neon-yellow = #f0ff00
neon-green = #39ff14
neon-purple = #bc13fe
neon-orange = #ff6700
disabled = #444b6a

[bar/example]
width = 96%
height = 28pt
offset-x = 2%
offset-y = 1%
radius = 4
border-size = 2pt
border-color = ${colors.neon-blue}
background = ${colors.background}
foreground = ${colors.foreground}
line-size = 2pt
padding-left = 1
padding-right = 1
module-margin = 1
separator = |
separator-foreground = ${colors.disabled}

font-0 = "FiraCode Nerd Font:size=11;3"
font-1 = "Symbols Nerd Font:size=13;3"
font-2 = "Font Awesome 6 Free:style=Solid:size=12;2"

modules-left = xworkspaces xwindow
modules-right = filesystem pulseaudio memory cpu eth wlan battery date systray powermenu
cursor-click = pointer
enable-ipc = true

[module/systray]
type = internal/tray
tray-spacing = 8pt

[module/xworkspaces]
type = internal/xworkspaces
label-active = %name%
label-active-background = ${colors.background-alt}
label-active-underline = ${colors.neon-pink}
label-active-padding = 1
label-occupied = %name%
label-occupied-padding = 1
label-urgent = %name%
label-urgent-background = ${colors.neon-orange}
label-urgent-padding = 1
label-empty = %name%
label-empty-foreground = ${colors.disabled}
label-empty-padding = 1

[module/xwindow]
type = internal/xwindow
label = %title:0:40:...%
label-foreground = ${colors.neon-blue}

[module/filesystem]
type = internal/fs
interval = 25
mount-0 = /
format-mounted-prefix = "󰋊 "
format-mounted-prefix-foreground = ${colors.neon-yellow}
label-mounted = %free%

[module/pulseaudio]
type = internal/pulseaudio
format-volume-prefix = "VOL "
format-volume-prefix-foreground = ${colors.neon-blue}
label-volume = %percentage%%
label-muted = "󰝟 muted"
label-muted-foreground = ${colors.disabled}

[module/memory]
type = internal/memory
interval = 3
format-prefix = " "
format-prefix-foreground = ${colors.neon-green}
label = %mb_used%

[module/cpu]
type = internal/cpu
interval = 2
format-prefix = " "
format-prefix-foreground = ${colors.neon-pink}
label = %percentage%%

[network-base]
type = internal/network
interval = 1.0
format-connected = <label-connected>
label-connected = "%{F#39ff14}󰇚%{F-} %downspeed%  %{F#ff6700}󰕒%{F-} %upspeed%"

[module/wlan]
inherit = network-base
interface = wlp3s0
format-connected-prefix = "  "
format-connected-prefix-foreground = ${colors.neon-blue}

[module/eth]
inherit = network-base
interface = enp0s31f6
format-connected-prefix = "󰈀  "
format-connected-prefix-foreground = ${colors.neon-purple}

[module/battery]
type = internal/battery
full-at = 99
low-at = 15
battery = BAT0
adapter = ADP1
format-charging = <animation-charging> <label-charging>
format-charging-foreground = ${colors.neon-green}
format-discharging = <ramp-capacity> <label-discharging>
format-discharging-foreground = ${colors.neon-purple}
label-charging = %percentage%%
label-discharging = %percentage%%
ramp-capacity-0 = 
ramp-capacity-1 = 
ramp-capacity-2 = 
ramp-capacity-3 = 
ramp-capacity-4 = 
animation-charging-0 = 
animation-charging-1 = 
animation-charging-2 = 
animation-charging-framerate = 750

[module/powermenu]
type = custom/text
format = <label>
label = ""
label-foreground = ${colors.neon-pink}
click-left = ~/.config/rofi/powermenu/type-5/powermenu.sh

[module/date]
type = internal/date
interval = 1
date = %H:%M
label = %date%
label-foreground = ${colors.neon-yellow}
