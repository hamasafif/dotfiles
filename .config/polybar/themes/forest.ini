[colors]
background = #DD2B3328
background-alt = #3A4536
foreground = #D3C6AA
green-light = #A7C080
green-dark = #83C092
yellow = #DBBC7F
orange = #E69875
red = #E67E80
disabled = #7A8478

[bar/example]
width = 98%
offset-x = 1%
offset-y = 1%
height = 24pt
radius = 8
background = ${colors.background}
foreground = ${colors.foreground}
line-size = 3pt
padding-left = 2
padding-right = 2
module-margin = 2
separator = 
separator-foreground = ${colors.disabled}

font-0 = "FiraCode Nerd Font:size=10;2"
font-1 = "Symbols Nerd Font:size=12;2"

modules-left = xworkspaces xwindow
modules-right = filesystem pulseaudio memory cpu eth wlan battery date systray powermenu
cursor-click = pointer
enable-ipc = true

[module/systray]
type = internal/tray
tray-spacing = 8pt

[module/xworkspaces]
type = internal/xworkspaces
label-active = %name%
label-active-background = ${colors.background-alt}
label-active-underline = ${colors.green-light}
label-active-padding = 2
label-occupied = %name%
label-occupied-padding = 2
label-urgent = %name%
label-urgent-background = ${colors.red}
label-urgent-padding = 2
label-empty = %name%
label-empty-foreground = ${colors.disabled}
label-empty-padding = 2

[module/xwindow]
type = internal/xwindow
label = %title:0:30:...%
label-foreground = ${colors.green-dark}

[module/filesystem]
type = internal/fs
mount-0 = /
format-mounted-prefix = "󰋊 "
format-mounted-prefix-foreground = ${colors.yellow}
label-mounted = %free%

[module/pulseaudio]
type = internal/pulseaudio
format-volume-prefix = "󰕾 "
format-volume-prefix-foreground = ${colors.green-light}
label-volume = %percentage%%

[module/memory]
type = internal/memory
format-prefix = "󰘚 "
format-prefix-foreground = ${colors.orange}
label = %mb_used%

[module/cpu]
type = internal/cpu
format-prefix = "󰍛 "
format-prefix-foreground = ${colors.red}
label = %percentage%%

[network-base]
type = internal/network
interval = 1.0
format-connected = <label-connected>
label-connected = "󰇚 %downspeed%"
label-connected-foreground = ${colors.green-light}

[module/wlan]
inherit = network-base
interface = wlp3s0
format-connected-prefix = " "

[module/eth]
inherit = network-base
interface = enp0s31f6
format-connected-prefix = "󰈀 "

[module/battery]
type = internal/battery
battery = BAT0
adapter = ADP1
format-charging = 󱐋 <label-charging>
format-charging-foreground = ${colors.yellow}
format-discharging = 󰁹 <label-discharging>
format-discharging-foreground = ${colors.green-light}
label-charging = %percentage%%
label-discharging = %percentage%%

[module/powermenu]
type = custom/text
format = <label>
label = "⏻"
label-foreground = ${colors.red}
click-left = ~/.config/rofi/powermenu.sh

[module/date]
type = internal/date
date = %H:%M
label = %date%
label-foreground = ${colors.yellow}
