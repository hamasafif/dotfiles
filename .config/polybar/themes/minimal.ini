[colors]
background = #F2000000
foreground = #FFFFFF
accent = #888888
alert = #FF5555

[bar/example]
width = 100%
height = 22pt
radius = 0
background = ${colors.background}
foreground = ${colors.foreground}
line-size = 2pt
padding-left = 1
padding-right = 2
module-margin = 2
separator = " "

font-0 = "FiraCode Nerd Font:size=10;2"
font-1 = "Symbols Nerd Font:size=11;2"

modules-left = xworkspaces xwindow
modules-center = date
modules-right = filesystem pulseaudio memory cpu wlan battery systray
cursor-click = pointer
enable-ipc = true

[module/systray]
type = internal/tray
tray-spacing = 8pt

[module/xworkspaces]
type = internal/xworkspaces
label-active = %name%
label-active-foreground = ${colors.foreground}
label-active-underline = ${colors.foreground}
label-active-padding = 1
label-occupied = %name%
label-occupied-foreground = ${colors.accent}
label-occupied-padding = 1
label-empty = %name%
label-empty-foreground = #333333
label-empty-padding = 1

[module/xwindow]
type = internal/xwindow
label = %title:0:40:...%
label-foreground = ${colors.accent}

[module/filesystem]
type = internal/fs
mount-0 = /
label-mounted =  %free%
label-mounted-foreground = ${colors.accent}

[module/pulseaudio]
type = internal/pulseaudio
label-volume =  %percentage%%
label-volume-foreground = ${colors.accent}

[module/memory]
type = internal/memory
label =  %mb_used%
label-foreground = ${colors.accent}

[module/cpu]
type = internal/cpu
label =  %percentage%%
label-foreground = ${colors.accent}

[module/wlan]
type = internal/network
interface = wlp3s0
label-connected =  %essid%
label-connected-foreground = ${colors.accent}

[module/battery]
type = internal/battery
battery = BAT0
adapter = ADP1
label-charging =  %percentage%%
label-discharging =  %percentage%%
label-charging-foreground = ${colors.foreground}
label-discharging-foreground = ${colors.accent}

[module/date]
type = internal/date
date = %a, %d %b | %H:%M
label = %date%
label-foreground = ${colors.foreground}
