[colors]
background = #282A36
background-alt = #44475A
foreground = #F8F8F2
orange = #FFB86C
yellow = #F1FA8C
disabled = #6272A4

[bar/example]
bottom = true
width = 100%
height = 28pt
radius = 0
border-top-size = 2pt
border-color = ${colors.orange}
background = ${colors.background}
foreground = ${colors.foreground}
line-size = 2pt
padding-left = 1
padding-right = 1
module-margin = 1
separator = //
separator-foreground = ${colors.disabled}

font-0 = "FiraCode Nerd Font:weight=bold:size=11;3"
font-1 = "Symbols Nerd Font:size=13;3"
font-2 = "Font Awesome 6 Free:style=Solid:size=12;2"

modules-left = powermenu xworkspaces xwindow
modules-right = filesystem pulseaudio memory cpu eth wlan battery date systray
cursor-click = pointer
enable-ipc = true

[module/systray]
type = internal/tray
tray-spacing = 8pt

[module/xworkspaces]
type = internal/xworkspaces
label-active = [%name%]
label-active-foreground = ${colors.orange}
label-active-padding = 1
label-occupied = %name%
label-occupied-padding = 1
label-urgent = %name%
label-urgent-background = ${colors.orange}
label-urgent-padding = 1
label-empty = %name%
label-empty-foreground = ${colors.disabled}
label-empty-padding = 1

[module/xwindow]
type = internal/xwindow
label = %title:0:40:...%
label-foreground = ${colors.disabled}

[module/filesystem]
type = internal/fs
interval = 25
mount-0 = /
format-mounted-prefix = "DISK "
format-mounted-prefix-foreground = ${colors.yellow}
label-mounted = %free%

[module/pulseaudio]
type = internal/pulseaudio
format-volume-prefix = "VOL "
format-volume-prefix-foreground = ${colors.orange}
label-volume = %percentage%%
label-muted = "MUTED"
label-muted-foreground = ${colors.disabled}

[module/memory]
type = internal/memory
interval = 3
format-prefix = "RAM "
format-prefix-foreground = ${colors.yellow}
label = %mb_used%

[module/cpu]
type = internal/cpu
interval = 2
format-prefix = "CPU "
format-prefix-foreground = ${colors.orange}
label = %percentage%%

[network-base]
type = internal/network
interval = 1.0
format-connected = <label-connected>
label-connected = "%{F#F1FA8C}D:%downspeed% %{F#FFB86C}U:%upspeed%"

[module/wlan]
inherit = network-base
interface = wlp3s0
format-connected-prefix = "WIFI "
format-connected-prefix-foreground = ${colors.orange}

[module/eth]
inherit = network-base
interface = enp0s31f6
format-connected-prefix = "LAN "
format-connected-prefix-foreground = ${colors.yellow}

[module/battery]
type = internal/battery
full-at = 99
low-at = 15
battery = BAT0
adapter = ADP1
format-charging = <label-charging>
format-charging-prefix = "PWR+ "
format-charging-prefix-foreground = ${colors.yellow}
format-discharging = <label-discharging>
format-discharging-prefix = "BAT- "
format-discharging-prefix-foreground = ${colors.orange}
label-charging = %percentage%%
label-discharging = %percentage%%

[module/powermenu]
type = custom/text
format = <label>
label = " SYS "
label-background = ${colors.orange}
label-foreground = ${colors.background}
click-left = ~/.config/rofi/powermenu/type-5/powermenu.sh

[module/date]
type = internal/date
interval = 1
date = %H:%M
label = %date%
label-foreground = ${colors.orange}
