[colors]
; Background gelap pekat khas hacker
background = #ee0d1117
background-alt = #30363d
foreground = #c9d1d9

; Palette warna colorful neon
neon-cyan   = #00ffff
neon-green  = #39ff14
neon-purple = #bc13fe
neon-pink   = #ff00ff
neon-yellow = #f0ff00
neon-orange = #ff6700
neon-red    = #ff003c
disabled    = #484f58

[bar/example]
; Bar melayang (floating) agar terasa modern
width = 98%
height = 26pt
offset-x = 1%
offset-y = 8pt
radius = 10

; Border neon yang tipis tapi tegas
border-size = 2pt
border-color = ${colors.neon-purple}

background = ${colors.background}
foreground = ${colors.foreground}

line-size = 3pt
padding-left = 2
padding-right = 2
module-margin = 1

; Separator kotak khas antarmuka hacker
separator = " ŅśĪ "
separator-foreground = ${colors.disabled}

font-0 = "FiraCode Nerd Font:weight=bold:size=10;3"
font-1 = "Symbols Nerd Font:size=12;3"
font-2 = "Font Awesome 6 Free:style=Solid:size=11;2"

modules-left = xworkspaces xwindow
modules-center = date
modules-right = filesystem cpu memory eth wlan battery pulseaudio systray powermenu updates

cursor-click = pointer
enable-ipc = true

[module/systray]
type = internal/tray
tray-spacing = 10pt

[module/xworkspaces]
type = internal/xworkspaces
label-active = %name%
label-active-background = ${colors.background-alt}
; Underline berwarna pink neon saat workspace aktif
label-active-underline = ${colors.neon-pink}
label-active-padding = 1

label-occupied = %name%
label-occupied-padding = 1

label-urgent = %name%
label-urgent-background = ${colors.neon-red}
label-urgent-padding = 1

label-empty = %name%
label-empty-foreground = ${colors.disabled}
label-empty-padding = 1

[module/xwindow]
type = internal/xwindow
; Menampilkan judul aplikasi dengan warna cyan neon
label = %title:0:30:...%
label-foreground = ${colors.neon-cyan}

[module/pulseaudio]
type = internal/pulseaudio
format-volume-prefix = "’Ć© "
format-volume-prefix-foreground = ${colors.neon-cyan}
label-volume = %percentage%%

[module/memory]
type = internal/memory
interval = 3
format-prefix = "Ņē” "
format-prefix-foreground = ${colors.neon-orange}
label = %mb_used%

[module/cpu]
type = internal/cpu
interval = 2
format-prefix = "’ŗø "
format-prefix-foreground = ${colors.neon-green}
label = %percentage%%

[module/fan]
type = custom/script
exec = sensors | awk '/fan1:/ {if ($2 == "N/A") print "0 RPM"; else print $2" "$3}'
interval = 2
format-prefix = "¾░łÉ "
format-prefix-foreground = ${colors.neon-cyan}
label = %output%

[module/power-watt]
type = custom/script
exec = ~/.config/polybar/scripts/power.sh
interval = 2
format-prefix = "’ā¦ "
format-prefix-foreground = ${colors.neon-yellow}
label = "%output%"

[network-base]
type = internal/network
interval = 1.0
format-connected = <label-connected>
label-connected = "%{F#39ff14}¾░ćÜ%{F-} %downspeed% %{F#bc13fe}¾░ĢÆ%{F-} %upspeed%"

[module/wlan]
inherit = network-base
interface = wlp3s0
format-connected-prefix = "’ć½ "
format-connected-prefix-foreground = ${colors.neon-cyan}

[module/eth]
inherit = network-base
interface = enp0s31f6
format-connected-prefix = "¾░łĆ "
format-connected-prefix-foreground = ${colors.neon-green}

[module/battery]
type = internal/battery
full-at = 99
low-at = 15
battery = BAT0
adapter = ADP1
format-charging = <animation-charging> <label-charging>
format-charging-foreground = ${colors.neon-green}
format-discharging = <ramp-capacity> <label-discharging>
format-discharging-foreground = ${colors.neon-pink}
label-charging = %percentage%%
label-discharging = %percentage%%
ramp-capacity-0 = ’ēä
ramp-capacity-1 = ’ēā
ramp-capacity-2 = ’ēé
ramp-capacity-3 = ’ēü
ramp-capacity-4 = ’ēĆ
animation-charging-0 = ’ēä
animation-charging-1 = ’ēā
animation-charging-2 = ’ēé
animation-charging-framerate = 750

[module/date]
type = internal/date
interval = 1
date = %H:%M:%S
date-alt = %A, %d %B
label = %date%
label-foreground = ${colors.neon-yellow}

[module/powermenu]
type = custom/text
format = <label>
label = " ’Ćæ "
label-foreground = ${colors.neon-red}
click-left = ~/.config/rofi/powermenu/type-5/powermenu.sh

[module/updates]
type = custom/script
exec = pacman -Qu | wc -l
interval = 3600 ; Cek setiap 1 jam
format-prefix = "¾░Ü░ "
format-prefix-foreground = ${colors.neon-pink}
label = "%output% Updates"
; Menyembunyikan modul jika tidak ada update (angka 0)
exec-if = test $(pacman -Qu | wc -l) -gt 0

[module/filesystem]
type = internal/fs
interval = 25
mount-0 = /
format-mounted-prefix = "¾░ŗŖ "
format-mounted-prefix-foreground = ${colors.neon-yellow}
label-mounted = %free%
