[colors]
background = #CC1E1E2E
background-alt = #313244
foreground = #CDD6F4
blue-sky = #89B4FA
lavender = #B4BEFE
disabled = #6C7086

[bar/example]
width = 98%
height = 28pt
offset-x = 1%
offset-y = 1%
radius = 12
border-size = 0pt
background = ${colors.background}
foreground = ${colors.foreground}
line-size = 3pt
padding-left = 2
padding-right = 2
module-margin = 1
separator = •
separator-foreground = ${colors.disabled}

font-0 = "FiraCode Nerd Font:size=11;3"
font-1 = "Symbols Nerd Font:size=13;3"
font-2 = "Font Awesome 6 Free:style=Solid:size=12;2"

modules-left = xworkspaces xwindow
modules-right = filesystem pulseaudio memory cpu eth wlan battery date systray powermenu
cursor-click = pointer
enable-ipc = true

[module/systray]
type = internal/tray
tray-spacing = 8pt

[module/xworkspaces]
type = internal/xworkspaces
label-active = %name%
label-active-background = ${colors.background-alt}
label-active-underline = ${colors.blue-sky}
label-active-padding = 1
label-occupied = %name%
label-occupied-padding = 1
label-urgent = %name%
label-urgent-background = ${colors.lavender}
label-urgent-padding = 1
label-empty = %name%
label-empty-foreground = ${colors.disabled}
label-empty-padding = 1

[module/xwindow]
type = internal/xwindow
label = %title:0:40:...%
label-foreground = ${colors.lavender}

[module/filesystem]
type = internal/fs
interval = 25
mount-0 = /
format-mounted-prefix = "󰋊 "
format-mounted-prefix-foreground = ${colors.blue-sky}
label-mounted = %free%

[module/pulseaudio]
type = internal/pulseaudio
format-volume-prefix = "VOL "
format-volume-prefix-foreground = ${colors.lavender}
label-volume = %percentage%%
label-muted = "󰝟 muted"
label-muted-foreground = ${colors.disabled}

[module/memory]
type = internal/memory
interval = 3
format-prefix = " "
format-prefix-foreground = ${colors.blue-sky}
label = %mb_used%

[module/cpu]
type = internal/cpu
interval = 2
format-prefix = " "
format-prefix-foreground = ${colors.blue-sky}
label = %percentage%%

[network-base]
type = internal/network
interval = 1.0
format-connected = <label-connected>
label-connected = "%{F#89B4FA}󰇚%{F-} %downspeed%  %{F#B4BEFE}󰕒%{F-} %upspeed%"

[module/wlan]
inherit = network-base
interface = wlp3s0
format-connected-prefix = "  "
format-connected-prefix-foreground = ${colors.blue-sky}

[module/eth]
inherit = network-base
interface = enp0s31f6
format-connected-prefix = "󰈀  "
format-connected-prefix-foreground = ${colors.lavender}

[module/battery]
type = internal/battery
full-at = 99
low-at = 15
battery = BAT0
adapter = ADP1
format-charging = <animation-charging> <label-charging>
format-charging-foreground = ${colors.blue-sky}
format-discharging = <ramp-capacity> <label-discharging>
format-discharging-foreground = ${colors.lavender}
label-charging = %percentage%%
label-discharging = %percentage%%
ramp-capacity-0 = 
ramp-capacity-1 = 
ramp-capacity-2 = 
ramp-capacity-3 = 
ramp-capacity-4 = 
animation-charging-0 = 
animation-charging-1 = 
animation-charging-2 = 
animation-charging-framerate = 750

[module/powermenu]
type = custom/text
format = <label>
label = ""
label-foreground = ${colors.blue-sky}
click-left = ~/.config/rofi/powermenu/type-5/powermenu.sh

[module/date]
type = internal/date
interval = 1
date = %H:%M
label = %date%
label-foreground = ${colors.foreground}
