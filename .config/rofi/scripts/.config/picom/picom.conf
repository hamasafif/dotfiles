# ==========================================
# ANIMASI (Optimasi Responsive & Smooth)
# ==========================================
animations = true;

# Menambah stiffness (kekakuan) agar animasi lebih cepat sampai tujuan
animation-stiffness-in-tag = 170; 
animation-stiffness-tag-change = 150.0;

# Mengurangi mass agar jendela terasa lebih ringan saat bergerak
animation-window-mass = 0.5;

# Menyesuaikan dampening agar tidak terlalu banyak goyangan di akhir
animation-dampening = 18;

# Memastikan animasi berhenti tepat waktu tanpa "overshoot" berlebih
animation-clamping = true;

# Gaya animasi yang lebih modern
animation-for-open-window = "zoom";      # Efek membesar lebih responsive dibanding slide
animation-for-unmap-window = "zoom";     # Konsisten saat menutup
animation-for-workspace-switch-in = "slide-right";
animation-for-workspace-switch-out = "slide-left";

# ==========================================
# PENYEMPURNAAN VISUAL
# ==========================================
# Sesuaikan corner radius agar senada dengan Dunst (15px)
corner-radius = 12; 

# Memperhalus Fading agar tidak terasa patah-patah
fading = true;
fade-in-step = 0.05;
fade-out-step = 0.05;
fade-delta = 3;
