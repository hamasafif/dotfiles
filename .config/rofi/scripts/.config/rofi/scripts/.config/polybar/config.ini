[colors]
background = #282A2E
background-alt = #373B41
foreground = #C5C8C6
primary = #F0C674
secondary = #8ABEB7
alert = #A54242
disabled = #707880

[bar/example]
width = 100%
height = 24pt
radius = 6
tray-padding = 2
tray-maxsize = 16

#modules-right = filesystem pulseaudio xkeyboard memory cpu eth date systray
; dpi = 96

background = ${colors.background}
foreground = ${colors.foreground}

line-size = 3pt

border-size = 4pt
border-color = #00000000

padding-left = 0
padding-right = 1

module-margin = 2

separator = |
separator-foreground = ${colors.disabled}

font-0 = "FiraCode Nerd Font:size=10;2"
font-1 = "Symbols Nerd Font:size=12;2"
font-2 = "Font Awesome 6 Free:style=Solid:size=12;2"

modules-left = xworkspaces xwindow
modules-right = filesystem pulseaudio xkeyboard memory cpu eth wlan battery date systray powermenu

cursor-click = pointer
cursor-scroll = ns-resize

enable-ipc = true

; wm-restack = generic
; wm-restack = bspwm
; wm-restack = i3

; override-redirect = true

; This module is not active by default (to enable it, add it to one of the
; modules-* list above).
; Please note that only a single tray can exist at any time. If you launch
; multiple bars with this module, only a single one will show it, the others
; will produce a warning. Which bar gets the module is timing dependent and can
; be quite random.
; For more information, see the documentation page for this module:
; https://polybar.readthedocs.io/en/stable/user/modules/tray.html
[module/systray]
type = internal/tray
format-margin = 8pt
tray-spacing = 16pt

[module/xworkspaces]
type = internal/xworkspaces

label-active = %name%
label-active-background = ${colors.background-alt}
label-active-underline= ${colors.primary}
label-active-padding = 1

label-occupied = %name%
label-occupied-padding = 1

label-urgent = %name%
label-urgent-background = ${colors.alert}
label-urgent-padding = 1

label-empty = %name%
label-empty-foreground = ${colors.disabled}
label-empty-padding = 1

[module/xwindow]
type = internal/xwindow
label = %title:0:60:...%

[module/filesystem]
type = internal/fs
interval = 25
mount-0 = /

format-mounted-prefix = "ůįčä "
format-mounted-prefix-foreground = ${colors.primary}
# Menampilkan total ruang penyimpanan yang masih kosong (Free)
label-mounted = %free%

label-unmounted = %mountpoint% not mounted
label-unmounted-foreground = ${colors.disabled}

[module/pulseaudio]
type = internal/pulseaudio

format-volume-prefix = "VOL "
format-volume-prefix-foreground = ${colors.primary}
format-volume = <label-volume>

label-volume = %percentage%%

label-muted = muted
label-muted-foreground = ${colors.disabled}

[module/xkeyboard]
type = internal/xkeyboard
blacklist-0 = num lock

label-layout = %layout%
label-layout-foreground = ${colors.primary}

label-indicator-padding = 2
label-indicator-margin = 1
label-indicator-foreground = ${colors.background}
label-indicator-background = ${colors.secondary}

[module/memory]
type = internal/memory
interval = 3
format-prefix = "ÓČ¶ "
format-prefix-foreground = ${colors.primary}
# Menampilkan penggunaan RAM dalam satuan MB
label = %mb_used%

[module/cpu]
type = internal/cpu
interval = 2
; Gunakan simbol, bukan tulisan "CPU"
format-prefix = "Ôčõ "
format-prefix-foreground = ${colors.primary}
label = %percentage%%

[network-base]
type = internal/network
interval = 1.0
format-connected = <label-connected>
# Menampilkan Ikon Panah (Down/Up) + Kecepatan
label-connected = "%{F#F0C674}ůįáö%{F-} %downspeed%  %{F#F0C674}ůįēí%{F-} %upspeed%"
format-disconnected = 

[module/wlan]
inherit = network-base
interface = wlp3s0
format-connected-prefix = "Ôáę  "
format-connected-prefix-foreground = ${colors.primary}

[module/eth]
inherit = network-base
interface = enp0s31f6
format-connected-prefix = "ůįąÄ  "
format-connected-prefix-foreground = ${colors.primary}

[module/battery]
type = internal/battery
full-at = 99
low-at = 15
battery = BAT0
adapter = ADP1

; Format saat Baterai Di-charge (Menambahkan simbol Petir/Charging)
format-charging = <animation-charging> <label-charging>
label-charging = %percentage%%
; Kamu bisa tambahkan simbol petir statis di label jika ingin: label-charging = ůĪźč %percentage%%

; Format saat Baterai Tidak Di-charge (Hanya ikon baterai biasa)
format-discharging = <ramp-capacity> <label-discharging>
label-discharging = %percentage%%

; Animasi saat charging (Ikon baterai yang berganti-ganti atau simbol petir)
animation-charging-0 = ÔČĄ ůĪźč
animation-charging-1 = ÔČÉ ůĪźč
animation-charging-2 = ÔČā ůĪźč
animation-charging-3 = ÔČĀ ůĪźč
animation-charging-4 = ÔČÄ ůĪźč
; Kecepatan kedip/ganti ikon (dalam milidetik)
animation-charging-framerate = 750
format-charging-foreground = #a3be8c
format-discharging-foreground = ${colors.foreground}
; Ikon saat tidak dicas (berdasarkan kapasitas)
ramp-capacity-0 = ÔČĄ
ramp-capacity-1 = ÔČÉ
ramp-capacity-2 = ÔČā
ramp-capacity-3 = ÔČĀ
ramp-capacity-4 = ÔČÄ

[module/powermenu]
type = custom/text
; Kamu bisa ganti ikon "ÔÄĎ" dengan teks "Power" jika ikon tidak muncul
format = <label>
label = "ÔÄĎ"
label-foreground = #ff5555
label-padding = 1

; Perintah untuk menjalankan menu power saat ikon di klik
click-left = /home/wrjunior/.config/rofi/powermenu/type-5/powermenu.sh

[module/date]
type = internal/date
interval = 1

date = %H:%M
date-alt = %Y-%m-%d %H:%M:%S

label = %date%
label-foreground = ${colors.primary}

[settings]
screenchange-reload = true
pseudo-transparency = true

; vim:ft=dosini
