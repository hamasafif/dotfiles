# ==========================================
# PENGATURAN DASAR PICOM
# ==========================================
backend = "glx";
vsync = true;
use-damage = true;

# ==========================================
# ANIMASI (Khusus FT-Labs Fork)
# ==========================================
animations = true;
animation-stiffness-in-tag = 125;
animation-stiffness-tag-change = 90.0;
animation-window-mass = 0.4;
animation-dampening = 15;
animation-clamping = true;

# Gaya animasi saat jendela dibuka (Pilih salah satu: slide-up, slide-down, slide-left, slide-right, zoom, fly-in)
animation-for-open-window = "slide-up";

# Gaya animasi saat jendela ditutup
animation-for-unmap-window = "slide-down";

# Gaya animasi saat pindah workspace (desktop)
animation-for-workspace-switch-in = "slide-right";
animation-for-workspace-switch-out = "slide-left";

# ==========================================
# SUDUT MELENGKUNG & BAYANGAN (Opsional)
# ==========================================
corner-radius = 8;
rounded-corners-exclude = [
  "class_g = 'Polybar'",
  "class_g = 'Rofi'"
];

shadow = true;
shadow-radius = 12;
shadow-opacity = 0.5;
shadow-offset-x = -12;
shadow-offset-y = -12;
shadow-exclude = [
  "class_g = 'Polybar'"
];

# ==========================================
# EFEK PUDAR (FADING)
# ==========================================
fading = true;
fade-in-step = 0.03;
fade-out-step = 0.03;
fade-delta = 5;
