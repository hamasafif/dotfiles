[terminal.shell]
program = "/usr/bin/zsh"
# Pengaturan Font Terminal
[font]
size = 11.0

[font.normal]
family = "FiraCode Nerd Font"
style = "Regular"

[font.bold]
family = "FiraCode Nerd Font"
style = "Bold"

[font.italic]
family = "FiraCode Nerd Font"
style = "Italic"

# Mengaktifkan ligatures (opsional, sangat keren untuk FiraCode)
[font.features]
features = ["calt", "liga"]
